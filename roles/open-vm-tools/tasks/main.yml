- name: Install open VM tools on VMWare
  ansible.builtin.package:
    name: open-vm-tools
    state: present
  when: ansible_virtualization_type == 'VMware'

- name: vmtoolsd service
  ansible.builtin.service:
    name: vmtoolsd
    state: started
    enabled: true
  when: ansible_virtualization_type == 'VMware'
